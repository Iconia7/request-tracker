# ============================================================
# Nginx server block for Request Tracker (static site)
# Place this file at:
#   /etc/nginx/sites-available/request-tracker
# Then symlink:
#   sudo ln -s /etc/nginx/sites-available/request-tracker \
#              /etc/nginx/sites-enabled/request-tracker
# ============================================================

server {
    listen 80;
    listen [::]:80;

    # Replace with your actual domain or VPS IP
    server_name task.nexoracreatives.co.ke;

    # Root directory where your files live
    root /var/www/request-tracker;
    index index.html;

    # ── Routing ──────────────────────────────────────────────
    # For a single-page app: serve index.html for any unknown path
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Asset Caching ─────────────────────────────────────────
    # Long-lived cache for CSS, JS, SVG, images
    location ~* \.(css|js|svg|ico|png|jpg|jpeg|webp|woff2|woff)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Gzip Compression ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/html
        application/javascript
        application/json
        image/svg+xml;

    # ── Security Headers ──────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "SAMEORIGIN"    always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;

    # ── Custom Error Pages ─────────────────────────────────────
    error_page 404 /index.html;

    # ── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/request-tracker.access.log;
    error_log  /var/log/nginx/request-tracker.error.log;
}

# ── HTTPS block (added automatically by Certbot) ──────────────
# Run: sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# Certbot will append an SSL server block and update this file.
